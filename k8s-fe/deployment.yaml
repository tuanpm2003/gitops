apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: demo-app
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;

      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      types_hash_max_size 2048;

      server {
        listen 80 default_server;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /api {
          proxy_pass http://api:3000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
          try_files $uri $uri/ /index.html;
        }

        location /healthz {
          access_log off;
          return 200 "ok\n";
          add_header Content-Type text/plain;
        }
      }
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fe-config
  namespace: demo-app
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  API_BASE_URL: "http://api:3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: demo-app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:
        - name: clone-repo
          image: alpine/git:v2.40.1
          command:
            - sh
            - -c
            - |
              git clone --depth 1 https://github.com/tuanpm2003/gitops.git /repo
              cp /repo/frontend/index.html /app/
              cp /repo/frontend/nginx.conf /app/
          volumeMounts:
            - name: app-code
              mountPath: /app
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: app-code
              mountPath: /usr/share/nginx/html
            - name: nginx-config
              mountPath: /etc/nginx
      volumes:
        - name: app-code
          emptyDir: {}
        - name: nginx-config
          configMap:
            name: nginx-config
            items:
              - key: nginx.conf
                path: nginx.conf
