apiVersion: v1
kind: ConfigMap
metadata:
  name: fe-config
  namespace: demo-app
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  API_BASE_URL: "http://api:3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: demo-app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
