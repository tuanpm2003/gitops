apiVersion: v1
kind: ConfigMap
metadata:
  name: be-config
  namespace: demo-app
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  VERSION: "v1.0"
  PORT: "3000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: demo-app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: node:18-alpine
          command:
            - sh
            - -c
            - |
              cd /app && npm install && npm start
          workingDir: /app
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: VERSION
              valueFrom:
                configMapKeyRef:
                  name: be-config
                  key: VERSION
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: app-code
              mountPath: /app
      volumes:
        - name: app-code
          emptyDir: {}
      initContainers:
        - name: copy-code
          image: busybox:1.35
          command: ["sh", "-c", 'echo "Init copy code"']
