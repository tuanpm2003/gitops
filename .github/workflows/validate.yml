name: validate

on:
  pull_request:
    paths:
      - "gitops/k8s/**"
      - "gitops/k8s-be/**"
      - "gitops/k8s-fe/**"
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/validate.yml"

jobs:
  validate-k8s:
    runs-on: ubuntu-latest
    name: Validate K8s Manifests
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo kc.tgz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kc.tgz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate k8s/ manifests
        run: kubeconform -strict -summary gitops/k8s/

      - name: Validate k8s-be/ manifests
        run: kubeconform -strict -summary gitops/k8s-be/

      - name: Validate k8s-fe/ manifests
        run: kubeconform -strict -summary gitops/k8s-fe/

  test-backend:
    runs-on: ubuntu-latest
    name: Test Backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install dependencies
        run: cd gitops/backend && npm install

      - name: Verify server file
        run: node -c gitops/backend/src/server.js

  build-images:
    runs-on: ubuntu-latest
    name: Build Docker Images
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./gitops/backend
          push: false
          tags: backend:latest

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./gitops/frontend
          push: false
          tags: frontend:latest
